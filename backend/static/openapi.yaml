openapi: 3.0.0
info:
  title: Handyman App API
  description: API dokumentacija za aplikaciju Handyman App. Ovaj API služi za upravljanje korisnicima, vozilima i popravkama.
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Lokalni razvojni server

components:
  schemas:

    # ------------------------------------------------------------------
    # KORISNIK - x-tablename govori OpenAlchemy-ju da napravi tabelu 'korisnici'
    # ------------------------------------------------------------------
    Korisnik:
      type: object
      x-tablename: korisnici
      properties:
        id:
          type: integer
          x-primary-key: true
          x-autoincrement: true
          example: 1
        username:
          type: string
          example: "korisnik1"
        password:
          type: string
          example: "sifra123"
      required:
        - username
        - password

    # ------------------------------------------------------------------
    # VOZILO - vozilo koje majstor koristi za dolazak na posao
    # ------------------------------------------------------------------
    Vozilo:
      type: object
      x-tablename: vozila
      properties:
        id:
          type: integer
          x-primary-key: true
          x-autoincrement: true
          example: 1
        user_id:
          type: integer
          x-foreign-key: korisnici.id
          description: ID korisnika (majstora) kome vozilo pripada
        marka:
          type: string
          example: "Volkswagen"
        model:
          type: string
          example: "Golf 7"
        potrosnja:
          type: number
          example: 6.5
        cena_goriva:
          type: number
          example: 200.5
        registracija:
          type: string
          description: "Datum isteka registracije vozila (format: MM-DD-YYYY)"
          example: "10-25-2026"
      required:
        - user_id
        - marka
        - model

    # ------------------------------------------------------------------
    # POPRAVKA - evidencija obavljenog posla 
    # ------------------------------------------------------------------
    Popravka:
      type: object
      x-tablename: popravke
      properties:
        id:
          type: integer
          x-primary-key: true
          x-autoincrement: true
          example: 1
        user_id:
          type: integer
          x-foreign-key: korisnici.id
          description: ID majstora koji je obavio posao
        opis:
          type: string
          example: "Servis bojlera"
        vozilo_id:
          type: integer
          x-foreign-key: vozila.id
          description: ID vozila kojim je majstor stigao na lokaciju
        km:
          type: number
          example: 15.5
        zarada:
          type: number
          example: 5000
        dodatni_trosak:
          type: number
          example: 500
        datum:
          type: string
          example: "2026-05-07"
        profit:
          type: number
          example: 4000
      required:
        - user_id
        - opis
        - vozilo_id

    # ------------------------------------------------------------------
    # INPUT SCHEMES - koriste se samo za validaciju zahteva (bez x-tablename)
    # ------------------------------------------------------------------
    VoziloInput:
      type: object
      required:
        - user_id
        - marka
        - model
      properties:
        user_id:
          type: integer
        marka:
          type: string
          example: "Volkswagen"
        model:
          type: string
          example: "Golf 7"
        potrosnja:
          type: number
          example: 6.5
        cena_goriva:
          type: number
          example: 200.5
        registracija:
          type: string
          description: "Datum isteka registracije vozila (format: MM-DD-YYYY)"
          example: "10-25-2026"

    PopravkaInput:
      type: object
      required:
        - user_id
        - opis
        - voziloId
      properties:
        user_id:
          type: integer
        opis:
          type: string
          example: "Servis bojlera"
        voziloId:
          type: integer
          description: ID vozila koje je majstor koristio za prevoz do lokacije
        km:
          type: number
          example: 15.5
        zarada:
          type: number
          example: 5000
        dodatniTrosak:
          type: number
          example: 500
        datum:
          type: string
          example: "2026-05-07"
        profit:
          type: number
          example: 4000

paths:
  /api/register:
    post:
      summary: Registracija novog korisnika
      tags:
        - Autentifikacija
      operationId: api.register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: "korisnik1"
                password:
                  type: string
                  example: "sifra123"
      responses:
        '201':
          description: Uspešna registracija
        '400':
          description: Korisničko ime je već zauzeto

  /api/login:
    post:
      summary: Prijava postojećeg korisnika
      tags:
        - Autentifikacija
      operationId: api.login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: "korisnik1"
                password:
                  type: string
                  example: "sifra123"
      responses:
        '200':
          description: Uspešna prijava (Vraća podatke korisnika)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Korisnik'
        '400':
          description: Podaci nisu poslati
        '401':
          description: Pogrešno korisničko ime ili lozinka

  /api/vozila:
    post:
      summary: Dodavanje novog vozila
      tags:
        - Vozila
      operationId: api.addVozilo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoziloInput'
      responses:
        '201':
          description: Vozilo uspešno dodato

  /api/vozila/{id}:
    get:
      summary: Dobijanje svih vozila za određenog korisnika
      tags:
        - Vozila
      operationId: api.getVozila
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID korisnika čija vozila tražimo
      responses:
        '200':
          description: Lista vozila
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vozilo'
    delete:
      summary: Brisanje vozila
      tags:
        - Vozila
      operationId: api.deleteVozilo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID vozila koje se briše
      responses:
        '200':
          description: Vozilo uspešno obrisano

  /api/popravke:
    post:
      summary: Unos nove popravke / posla
      tags:
        - Popravke
      operationId: api.addPopravka
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PopravkaInput'
      responses:
        '201':
          description: Popravka uspešno sačuvana

  /api/popravke/{user_id}:
    get:
      summary: Dobijanje istorije popravki za korisnika
      tags:
        - Popravke
      operationId: api.getPopravke
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Lista popravki
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Popravka'
