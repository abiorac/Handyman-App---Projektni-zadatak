version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: handyman_user
      POSTGRES_PASSWORD: handyman_password
      POSTGRES_DB: handyman_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U handyman_user -d handyman_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://handyman_user:handyman_password@db:5432/handyman_db
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    depends_on:
      - backend

volumes:
  postgres_data: